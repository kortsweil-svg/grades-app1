<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ציונים — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --green: #22c55e;
  --green-dim: #16a34a;
  --green-glow: rgba(34,197,94,0.15);
  --green-border: rgba(34,197,94,0.3);
  --bg: #0a0e0c;
  --bg2: #111713;
  --bg3: #161d18;
  --surface: #1a2320;
  --surface2: #1f2b25;
  --border: rgba(255,255,255,0.07);
  --border-green: rgba(34,197,94,0.2);
  --text: #e8ede9;
  --text-dim: #8a9e8d;
  --text-muted: #4a5e4d;
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'IBM Plex Sans Hebrew', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

/* Background grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,197,94,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

/* Glow orb */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%);
  pointer-events: none;
}

header {
  position: fixed;
  top: 0; left: 0; right: 0;
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: rgba(10,14,12,0.8);
  backdrop-filter: blur(12px);
  z-index: 10;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 32px; height: 32px;
  background: var(--green);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.logo-text { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.version { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-muted); background: var(--surface); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }

.container {
  width: 100%;
  max-width: 420px;
  padding: 1.5rem;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-green);
  border-radius: 16px;
  padding: 2.5rem;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  opacity: 0.5;
}

.card-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--green);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  opacity: 0.8;
}
.card-title { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; }
.card-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 2rem; }

.field { margin-bottom: 1.25rem; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.field input {
  width: 100%;
  padding: 12px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  font-family: 'IBM Plex Sans Hebrew', sans-serif;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
  direction: ltr;
  text-align: right;
}
.field input::placeholder { color: var(--text-muted); }
.field input:focus {
  border-color: var(--green-border);
  box-shadow: 0 0 0 3px var(--green-glow);
}

.btn {
  width: 100%;
  padding: 13px;
  background: var(--green);
  color: #0a0e0c;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  font-family: 'IBM Plex Sans Hebrew', sans-serif;
  cursor: pointer;
  transition: all .2s;
  margin-top: 0.5rem;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}
.btn:hover { background: #16a34a; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(34,197,94,0.3); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

.msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 12px; text-align: center; }
.msg-err { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.msg-ok { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-border); }

.first-note {
  background: rgba(234,179,8,0.08);
  border: 1px solid rgba(234,179,8,0.2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #fbbf24;
  margin-bottom: 1.25rem;
  text-align: center;
  display: none;
}

.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(10,14,12,0.3); border-top-color: #0a0e0c;
  border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-icon">📋</div>
    <span class="logo-text">מערכת ציונים</span>
  </div>
  <span class="version">v2.0</span>
</header>

<div class="container">
  <div class="card">
    <div class="card-tag">// teacher access</div>
    <div class="card-title">כניסת מורה</div>
    <div class="card-sub">הכנס פרטים לאימות זהות</div>
    <div class="first-note" id="first-note">⭐ כניסה ראשונה — הפרטים שתזין ישמשו לכניסות הבאות</div>
    <div class="field">
      <label>תעודת זהות</label>
      <input type="text" id="id-number" placeholder="123456789" maxlength="9" inputmode="numeric" autocomplete="off">
    </div>
    <div class="field">
      <label>טלפון סלולרי</label>
      <input type="text" id="phone" placeholder="0501234567" maxlength="10" inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn" id="login-btn" onclick="login()">כניסה למערכת</button>
    <div id="msg"></div>
  </div>
</div>

<script>
const token = sessionStorage.getItem('teacher_token');
if (token) {
  fetch('/api/teacher/check', { headers: { 'x-session-token': token } })
    .then(r => r.json()).then(d => { if (d.valid) window.location.href = '/'; });
}

document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const id_number = document.getElementById('id-number').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const msgEl = document.getElementById('msg');
  msgEl.innerHTML = '';
  if (!id_number) { msgEl.innerHTML = '<div class="msg msg-err">נא להזין תז</div>'; return; }
  if (!phone)     { msgEl.innerHTML = '<div class="msg msg-err">נא להזין טלפון</div>'; return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = 'מאמת... <span class="spinner"></span>';
  try {
    const res = await fetch('/api/teacher/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id_number, phone })
    });
    const data = await res.json();
    if (!res.ok) { msgEl.innerHTML = `<div class="msg msg-err">${data.error}</div>`; return; }
    msgEl.innerHTML = '<div class="msg msg-ok">✓ מאומת — מעביר...</div>';
    sessionStorage.setItem('teacher_token', data.token);
    setTimeout(() => window.location.href = '/', 600);
  } catch(e) {
    msgEl.innerHTML = '<div class="msg msg-err">שגיאת רשת</div>';
  } finally {
    btn.disabled = false; btn.textContent = 'כניסה למערכת';
  }
}
</script>
</body>
</html>
