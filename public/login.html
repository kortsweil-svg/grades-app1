<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כניסת מורה</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; flex-direction: column; }
header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
header h1 { font-size: 18px; font-weight: 500; }
.role-badge { background: #e8c84a; color: #1a1a2e; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.container { max-width: 400px; margin: 5rem auto; padding: 0 1rem; width: 100%; }
.card { background: #fff; border: 1px solid #e5e5e0; border-radius: 16px; padding: 2rem; }
.card-title { font-size: 20px; font-weight: 700; text-align: center; margin-bottom: 0.4rem; }
.card-sub { font-size: 13px; color: #aaa; text-align: center; margin-bottom: 2rem; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
.field input { width: 100%; padding: 11px 14px; border: 2px solid #e5e5e0; border-radius: 10px; font-size: 15px; font-family: inherit; background: #fafaf8; transition: border .15s; }
.field input:focus { outline: none; border-color: #1a1a2e; background: #fff; }
.btn { width: 100%; padding: 13px; background: #1a1a2e; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-family: inherit; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 0.5rem; }
.btn:hover { background: #2d2d4e; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
.msg { font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-top: 12px; text-align: center; }
.msg-err { background: #fee2e2; color: #991b1b; }
.msg-ok { background: #dcfce7; color: #166534; }
.first-time-note { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 1rem; text-align: center; display: none; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>📋 מערכת ציונים</h1>
  <span class="role-badge">כניסת מורה</span>
</header>
<div class="container">
  <div class="card">
    <div class="card-title">שלום מורה</div>
    <div class="card-sub">הכנס תז ומספר טלפון סלולרי</div>
    <div class="first-time-note" id="first-note">⭐ כניסה ראשונה — הפרטים שתזין ישמשו לכניסות הבאות</div>
    <div class="field">
      <label>תעודת זהות</label>
      <input type="text" id="id-number" placeholder="123456789" maxlength="9" inputmode="numeric" autocomplete="off">
    </div>
    <div class="field">
      <label>טלפון סלולרי</label>
      <input type="text" id="phone" placeholder="0501234567" maxlength="10" inputmode="numeric" autocomplete="off">
    </div>
    <button class="btn" id="login-btn" onclick="login()">כניסה</button>
    <div id="msg"></div>
  </div>
</div>
<script>
// If already logged in, redirect
const token = sessionStorage.getItem('teacher_token');
if (token) {
  fetch('/api/teacher/check', { headers: { 'x-session-token': token } })
    .then(r => r.json()).then(d => { if (d.valid) window.location.href = '/'; });
}

// Check if first time
fetch('/api/teacher/check', { headers: { 'x-session-token': '' } })
  .then(() => {})
  .catch(() => {});

// Show first-time note heuristic: try a dummy check
(async () => {
  try {
    const r = await fetch('/api/teacher/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ id_number: '___check___', phone: '___check___' })
    });
    const d = await r.json();
    if (d.first_time) document.getElementById('first-note').style.display = 'block';
  } catch(e) {}
})();

document.getElementById('phone').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

async function login() {
  const id_number = document.getElementById('id-number').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const msgEl = document.getElementById('msg');
  msgEl.innerHTML = '';

  if (!id_number) { msgEl.innerHTML = '<div class="msg msg-err">נא להזין תז</div>'; return; }
  if (!phone)     { msgEl.innerHTML = '<div class="msg msg-err">נא להזין טלפון</div>'; return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.innerHTML = 'מתחבר... <span class="spinner"></span>';

  try {
    const res = await fetch('/api/teacher/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id_number, phone })
    });
    const data = await res.json();
    if (!res.ok) { msgEl.innerHTML = `<div class="msg msg-err">${data.error}</div>`; return; }
    if (data.first_time) {
      msgEl.innerHTML = '<div class="msg msg-ok">✓ פרטים נשמרו! מעביר לניהול...</div>';
    }
    sessionStorage.setItem('teacher_token', data.token);
    setTimeout(() => window.location.href = '/', 800);
  } catch(e) {
    msgEl.innerHTML = '<div class="msg msg-err">שגיאת רשת</div>';
  } finally {
    btn.disabled = false; btn.textContent = 'כניסה';
  }
}
</script>
</body>
</html>
